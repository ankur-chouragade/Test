<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>शब्दार्थ — रोज़ पाँच शब्द</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=Mukta:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F4EC;
    --ink:#1C1D2E;
    --ink-soft:#5A5B6E;
    --teal:#0E6E63;
    --teal-soft:#E3EEEC;
    --marigold:#E8A33D;
    --green:#2E7D4F;
    --green-bg:#E4F2E9;
    --red:#C0392B;
    --red-bg:#F9E7E4;
    --line:#D8D3C4;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Mukta',system-ui,sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .wrap{width:100%;max-width:560px;padding:0 20px 60px}

  /* ── Header with shirorekha progress ── */
  header{padding:28px 0 10px;text-align:center}
  .title{font-family:'Tiro Devanagari Hindi',serif;font-size:2.2rem;line-height:1.2}
  .tagline{color:var(--ink-soft);font-size:.95rem;margin-top:2px}
  .day-label{display:inline-block;margin-top:10px;font-size:.8rem;letter-spacing:.06em;color:var(--teal);background:var(--teal-soft);padding:3px 12px;border-radius:999px;font-weight:500}

  .shiro{height:4px;background:var(--line);border-radius:2px;margin:18px 0 6px;position:relative;overflow:hidden}
  .shiro-fill{position:absolute;left:0;top:0;bottom:0;width:0%;background:var(--teal);border-radius:2px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .shiro-meta{display:flex;justify-content:space-between;font-size:.8rem;color:var(--ink-soft);margin-bottom:14px}

  /* ── Word card ── */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:30px 24px 24px;box-shadow:0 1px 3px rgba(28,29,46,.05)}
  .word{
    font-family:'Tiro Devanagari Hindi',serif;
    font-size:2.6rem;
    text-align:center;
    padding-bottom:14px;
    margin-bottom:22px;
    border-bottom:3px solid var(--ink);
    line-height:1.4;
  }
  .ask{text-align:center;color:var(--ink-soft);font-size:.9rem;margin-bottom:16px}

  .opt{
    display:block;width:100%;text-align:left;
    font-family:'Mukta',sans-serif;font-size:1.05rem;color:var(--ink);
    background:var(--paper);border:1.5px solid var(--line);border-radius:10px;
    padding:13px 16px;margin-bottom:10px;cursor:pointer;
    transition:border-color .15s, background .15s, transform .08s;
  }
  .opt:hover:not(:disabled){border-color:var(--teal)}
  .opt:active:not(:disabled){transform:scale(.99)}
  .opt:focus-visible{outline:3px solid var(--marigold);outline-offset:2px}
  .opt:disabled{cursor:default}
  .opt.correct{background:var(--green-bg);border-color:var(--green);color:var(--green);font-weight:700}
  .opt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red);font-weight:700}
  .opt.dim{opacity:.45}

  .next-btn{
    display:block;margin:8px auto 0;
    background:var(--ink);color:var(--paper);border:none;border-radius:999px;
    font-family:'Mukta',sans-serif;font-size:1rem;font-weight:500;
    padding:11px 34px;cursor:pointer;transition:background .15s;
  }
  .next-btn:hover{background:var(--teal)}
  .next-btn:focus-visible{outline:3px solid var(--marigold);outline-offset:2px}

  /* ── Result screen ── */
  .result{text-align:center;padding-top:8px}
  .result .big-score{font-family:'Tiro Devanagari Hindi',serif;font-size:4rem;color:var(--teal);line-height:1.2}
  .result .verdict{font-size:1.15rem;margin:2px 0 18px}
  .emoji-row{font-size:1.6rem;letter-spacing:.18em;margin-bottom:22px}
  .stats{display:flex;justify-content:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 18px;min-width:88px}
  .stat .num{font-size:1.6rem;font-weight:700;color:var(--ink)}
  .stat .num.fire{color:var(--marigold)}
  .stat .lbl{font-size:.78rem;color:var(--ink-soft)}
  .review{text-align:left;margin-top:6px}
  .review h3{font-size:.95rem;color:var(--ink-soft);font-weight:500;margin-bottom:10px;text-align:center}
  .rev-item{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .rev-word{font-family:'Tiro Devanagari Hindi',serif;font-size:1.2rem}
  .rev-ans{font-size:.92rem;color:var(--ink-soft);text-align:right}
  .rev-mark{font-size:1.1rem}
  .share-btn{
    background:var(--teal);color:#fff;border:none;border-radius:999px;
    font-family:'Mukta',sans-serif;font-size:1rem;font-weight:500;
    padding:12px 36px;cursor:pointer;margin-top:18px;transition:background .15s;
  }
  .share-btn:hover{background:var(--ink)}
  .come-back{margin-top:14px;font-size:.88rem;color:var(--ink-soft)}

  footer{margin-top:auto;padding:20px;font-size:.78rem;color:var(--ink-soft);text-align:center}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important}
  }
  @media (max-width:420px){
    .title{font-size:1.9rem}
    .word{font-size:2.1rem}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title">शब्दार्थ</div>
    <div class="tagline">रोज़ पाँच कठिन शब्द · अर्थ पहचानिए</div>
    <div class="day-label" id="dayLabel"></div>
  </header>

  <div class="shiro"><div class="shiro-fill" id="shiroFill"></div></div>
  <div class="shiro-meta"><span id="progressText"></span><span id="scoreText"></span></div>

  <main id="game"></main>
</div>
<footer>शब्दार्थ · एक छोटा-सा शब्द-खेल</footer>

(function(){

  var DATA_B64 = "W1t7InciOiLgpKjgpL/gpLDgpY3gpJ3gpLAiLCJvIjpbIuCkneCksOCkqOCkviIsIuCkquCksOCljeCkteCkpCIsIuCkrOCkvuCkpuCksiIsIuCksOClh+Ckl+Ckv+CkuOCljeCkpOCkvuCkqCJdLCJjIjowfSx7InciOiLgpJXgpY3gpLfgpKPgpK3gpILgpJfgpYHgpLAiLCJvIjpbIuCkuOCkpuCkviDgpKzgpKjgpL4g4KSw4KS54KSo4KWHIOCkteCkvuCksuCkviIsIuCkrOCkueClgeCkpCDgpK3gpL7gpLDgpYAiLCLgpKzgpLngpYHgpKQg4KSV4KSuIOCkuOCkruCkryDgpKTgpJUg4KSw4KS54KSo4KWHIOCkteCkvuCksuCkviIsIuCkrOCkueClgeCkpCDgpKrgpYHgpLDgpL7gpKjgpL4iXSwiYyI6Mn0seyJ3Ijoi4KS14KS+4KSa4KS+4KSyIiwibyI6WyLgpJrgpYHgpKog4KSw4KS54KSo4KWHIOCkteCkvuCksuCkviIsIuCkrOCkueClgeCkpCDgpKzgpYvgpLLgpKjgpYcg4KS14KS+4KSy4KS+Iiwi4KSk4KWH4KSc4KS8IOCkpuCljOCkoeCkvOCkqOClhyDgpLXgpL7gpLLgpL4iLCLgpJ3gpYLgpKAg4KSs4KWL4KSy4KSo4KWHIOCkteCkvuCksuCkviJdLCJjIjoxfSx7InciOiLgpIXgpKjgpYHgpJfgpY3gpLDgpLkiLCJvIjpbIuCkleCljeCksOCli+CkpyIsIuCkmOClg+Cko+CkviIsIuCkreCkryIsIuCkleClg+CkquCkviJdLCJjIjozfSx7InciOiLgpKrgpL7gpLfgpL7gpKMiLCJvIjpbIuCkquCkvuCkqOClgCIsIuCkquCkpOCljeCkpeCksCIsIuCkquClh+CkoeCkvCIsIuCkruCkv+Ckn+CljeCkn+ClgCJdLCJjIjoxfV0sW3sidyI6IuCkruClg+Ckl+CkpOClg+Ckt+CljeCko+CkviIsIm8iOlsi4KSd4KWC4KSg4KS+IOCkhuCkreCkvuCkuCDgpK/gpL4g4KSt4KWN4KSw4KSuIiwi4KSX4KS54KSw4KWAIOCkqOClgOCkguCkpiIsIuCkuOCkmuCljeCkmuClgCDgpIfgpJrgpY3gpJvgpL4iLCLgpJzgpILgpJfgpLIg4KSV4KWAIOCkhuCklyJdLCJjIjowfSx7InciOiLgpKjgpL/gpLbgpL7gpJrgpLAiLCJvIjpbIuCkuOClgeCkrOCkuSDgpJzgpLLgpY3gpKbgpYAg4KSJ4KSg4KSo4KWHIOCkteCkvuCksuCkviIsIuCkquCkvuCkqOClgCDgpK7gpYfgpIIg4KSw4KS54KSo4KWHIOCkteCkvuCksuCkviIsIuCksOCkvuCkpCDgpK7gpYfgpIIg4KS14KS/4KSa4KSw4KSjIOCkleCksOCkqOClhyDgpLXgpL7gpLLgpL4iLCLgpKrgpLngpL7gpKHgpLwg4KSq4KSwIOCksOCkueCkqOClhyDgpLXgpL7gpLLgpL4iXSwiYyI6Mn0seyJ3Ijoi4KSF4KSu4KWN4KSs4KWB4KSn4KS/IiwibyI6WyLgpIbgpJXgpL7gpLYiLCLgpKrgpLDgpY3gpLXgpKQiLCLgpKjgpKbgpYAiLCLgpLjgpK7gpYHgpKbgpY3gpLAiXSwiYyI6M30seyJ3Ijoi4KSV4KWD4KSq4KSjIiwibyI6WyLgpJXgpILgpJzgpYLgpLgiLCLgpKbgpL7gpKjgpYAiLCLgpJXgpY3gpLDgpYvgpKfgpYAiLCLgpIbgpLLgpLjgpYAiXSwiYyI6MH0seyJ3Ijoi4KSF4KS14KSo4KS/IiwibyI6WyLgpIbgpJXgpL7gpLYiLCLgpKrgpYPgpKXgpY3gpLXgpYAiLCLgpJzgpLIiLCLgpI jgpK7gpYHgpKbgpY3gpLAiXSwiYyI6Mn0seyJ3Ijoi4KSF4KS54KSw4KWN4KSo4KS/4KS2IiwibyI6WyLgpJXgpYfgpLXgpLIg4KSw4KS+4KSkIOCkruClh+CkgiIsIuCkleCkreClgC3gpJXgpK3gpYAiLCLgpJXgpYfgpLXgpLIg4KSm4KS/4KSoIOCkruClh+CkgiIsIuCkpuCkv+CkqC3gpLDgpL7gpKQg4KSy4KSX4KS+4KSk4KS+4KSwIl0sImMiOjN9LHsidyI6IuCknOCkv+CknOClgOCkteCkv+Ckt+CkviIsIm8iOlsi4KSc4KWA4KSo4KWHIOCkleClgCDgpKrgpY3gpLDgpKzgpLIg4KSH4KSa4KWN4KSb4KS+Iiwi4KSc4KWA4KSk4KSo4KWHIOCkleClgCDgpIfgpJrgpY3gpJvgpL4iLCLgpJzgpL7gpKjgpKjgpYcg4KSV4KWAIOCkh+CkmuCljeCkm+CkviIsIuCkmOClguCkruCkqOClhyDgpJXgpYAg4KSH4KSa4KWN4KSb4KS+Il0sImMiOjB9LHsidyI6IuCkqOCkv+Ckt+CljeCkoOClgeCksCIsIm8iOlsi4KSm4KSv4KS+4KSy4KWBIiwi4KSo4KS/4KSw4KWN4KSm4KSv4KWAIOCklOCksCDgpJXgpKDgpYvgpLAiLCLgpJXgpYvgpK7gpLIiLCLgpJrgpKTgpYHgpLAiXSwiYyI6MX0seyJ3Ijoi4KSJ4KSq4KS54KS+4KS4IiwibyI6WyLgpIngpKrgpLngpL7gpLAg4KSm4KWH4KSo4KS+Iiwi4KSq4KWN4KSw4KS24KSC4KS44KS+IOCkleCksOCkqOCkviIsIuCkuOCljeCkteCkvuCkl+CkpCDgpJXgpLDgpKjgpL4iLCLgpK7gpJzgpLzgpL7gpJUg4KSJ4KSh4KS84KS+4KSo4KS+Il0sImMiOjN9XV0=";
  var STORE_KEY = "shabdarth_v1";

  /* ───── Data ───── */
  var DAYS = JSON.parse(decodeURIComponent(escape(atob(DATA_B64))));

  /* ───── Date helpers (IST) ───── */
  function istToday(){
    return new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Kolkata"}); // YYYY-MM-DD
  }
  function dayDiff(a,b){ // b - a in days
    return Math.round((new Date(b+"T00:00:00Z") - new Date(a+"T00:00:00Z"))/86400000);
  }
  var todayStr = istToday();
  var dayNumber = dayDiff(LAUNCH, todayStr);            // 0-based; can be negative pre-launch
  var dayIndex = ((dayNumber % DAYS.length)+DAYS.length)%DAYS.length; // cycles through pool
  var puzzle = DAYS[dayIndex];

  /* ───── State (localStorage) ───── */
  function loadState(){
    try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
    catch(e){ return {}; }
  }
  function saveState(s){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }catch(e){}
  }
  var state = loadState();
  if(!state.answers) state.answers = {};   // {date: [pickedIndex x5]}
  if(!state.scores)  state.scores  = {};   // {date: score}
  if(typeof state.streak     !== "number") state.streak = 0;
  if(typeof state.bestStreak !== "number") state.bestStreak = 0;
  if(typeof state.daysPlayed !== "number") state.daysPlayed = 0;

  var todayAnswers = state.answers[todayStr] || [];
  var current = todayAnswers.length;       // index of word to show next
  var finishedToday = (current >= puzzle.length);

  /* ───── DOM refs ───── */
  var game = document.getElementById("game");
  var shiroFill = document.getElementById("shiroFill");
  var progressText = document.getElementById("progressText");
  var scoreText = document.getElementById("scoreText");
  document.getElementById("dayLabel").textContent = "दिन " + (dayNumber+1) + " · " + todayStr;

  function scoreSoFar(){
    var s=0;
    for(var i=0;i<todayAnswers.length;i++){
      if(todayAnswers[i] === puzzle[i].c) s++;
    }
    return s;
  }
  function updateHeader(){
    var done = todayAnswers.length;
    shiroFill.style.width = (done/puzzle.length*100) + "%";
    progressText.textContent = "शब्द " + Math.min(done+1,puzzle.length) + " / " + puzzle.length;
    scoreText.textContent = "अंक: " + scoreSoFar();
    if(finishedToday){ progressText.textContent = "आज पूरा हुआ ✓"; }
  }

  /* ───── Question screen ───── */
  function showQuestion(i){
    var q = puzzle[i];
    var card = document.createElement("div");
    card.className = "card";
    var h = '<div class="word">' + q.w + '</div>' +
            '<div class="ask">इस शब्द का अर्थ क्या है?</div>';
    for(var k=0;k<q.o.length;k++){
      h += '<button class="opt" data-k="'+k+'">'+ q.o[k] +'</button>';
    }
    card.innerHTML = h;
    game.innerHTML = "";
    game.appendChild(card);
    updateHeader();

    var opts = card.querySelectorAll(".opt");
    function pick(k){
      todayAnswers.push(k);
      state.answers[todayStr] = todayAnswers;
      saveState(state);
      for(var j=0;j<opts.length;j++){
        opts[j].disabled = true;
        if(j === q.c) opts[j].classList.add("correct");
        else if(j === k) opts[j].classList.add("wrong");
        else opts[j].classList.add("dim");
      }
      updateHeader();
      var btn = document.createElement("button");
      btn.className = "next-btn";
      btn.textContent = (i+1 < puzzle.length) ? "अगला शब्द →" : "परिणाम देखें";
      btn.addEventListener("click", function(){
        current++;
        if(current < puzzle.length) showQuestion(current);
        else finishDay();
      });
      card.appendChild(btn);
      btn.focus();
    }
    for(var j=0;j<opts.length;j++){
      (function(b){
        b.addEventListener("click", function(){ pick(parseInt(b.getAttribute("data-k"),10)); });
      })(opts[j]);
    }
  }

  /* ───── Finish & streaks ───── */
  function finishDay(){
    if(!(todayStr in state.scores)){
      var sc = scoreSoFar();
      state.scores[todayStr] = sc;
      // streak: continued if last played date was yesterday
      var yesterday = null;
      var dates = Object.keys(state.scores).filter(function(d){return d!==todayStr;}).sort();
      if(dates.length) yesterday = dates[dates.length-1];
      if(yesterday && dayDiff(yesterday, todayStr) === 1) state.streak += 1;
      else state.streak = 1;
      if(state.streak > state.bestStreak) state.bestStreak = state.streak;
      state.daysPlayed += 1;
      saveState(state);
    }
    finishedToday = true;
    showResult();
  }

  /* ───── Result screen ───── */
  function emojiRow(){
    var r="";
    for(var i=0;i<puzzle.length;i++){
      r += (todayAnswers[i]===puzzle[i].c) ? "🟩" : "🟥";
    }
    return r;
  }
  function verdict(sc){
    if(sc===5) return "वाह! शब्द-सम्राट 👑";
    if(sc===4) return "बहुत बढ़िया!";
    if(sc===3) return "अच्छा प्रयास!";
    if(sc===2) return "अभ्यास जारी रखें";
    return "कल फिर कोशिश कीजिए!";
  }
  function showResult(){
    var sc = state.scores[todayStr] || scoreSoFar();
    updateHeader();
    var h = '<div class="result">' +
      '<div class="big-score">'+sc+'/5</div>' +
      '<div class="verdict">'+verdict(sc)+'</div>' +
      '<div class="emoji-row">'+emojiRow()+'</div>' +
      '<div class="stats">' +
        '<div class="stat"><div class="num fire">🔥 '+state.streak+'</div><div class="lbl">वर्तमान स्ट्रीक</div></div>' +
        '<div class="stat"><div class="num">'+state.bestStreak+'</div><div class="lbl">सर्वश्रेष्ठ स्ट्रीक</div></div>' +
        '<div class="stat"><div class="num">'+state.daysPlayed+'</div><div class="lbl">कुल दिन</div></div>' +
      '</div>' +
      '<div class="review"><h3>आज के शब्द</h3>';
    for(var i=0;i<puzzle.length;i++){
      var ok = todayAnswers[i]===puzzle[i].c;
      h += '<div class="rev-item">' +
             '<span class="rev-word">'+puzzle[i].w+'</span>' +
             '<span class="rev-ans">'+puzzle[i].o[puzzle[i].c]+' <span class="rev-mark">'+(ok?"✅":"❌")+'</span></span>' +
           '</div>';
    }
    h += '</div>' +
      '<button class="share-btn" id="shareBtn">परिणाम साझा करें</button>' +
      '<div class="come-back">कल नए पाँच शब्द मिलेंगे 🌅</div>' +
      '</div>';
    game.innerHTML = h;

    document.getElementById("shareBtn").addEventListener("click", function(){
      var txt = "शब्दार्थ — दिन " + (dayNumber+1) + "\n" + emojiRow() + " " + sc + "/5\n" + location.href;
      var btn = this;
      function done(){ btn.textContent = "कॉपी हो गया ✓"; setTimeout(function(){btn.textContent="परिणाम साझा करें";},2000); }
      if(navigator.share){
        navigator.share({text:txt}).catch(function(){});
      } else if(navigator.clipboard){
        navigator.clipboard.writeText(txt).then(done).catch(function(){});
      }
    });
  }

  /* ───── Boot ───── */
  if(finishedToday){
    if(!(todayStr in state.scores)) finishDay(); // edge: answered all, closed tab before scoring
    else showResult();
  } else {
    showQuestion(current);
  }
})();
</script>
</body>
</html>
