<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>बुद्धीघर — रोज ७ प्रश्न</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Marathi:ital@0;1&family=Mukta:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #F5F2EB;
  --card:      #FFFFFF;
  --ink:       #1A1A2E;
  --ink-soft:  #6B6B80;
  --border:    #DDD9CC;
  --accent:    #4A5568;
  --saffron:   #E07B39;
  --saffron-bg:#FDF0E7;
  --teal:      #2C7A6E;
  --teal-bg:   #E4F0EE;
  --selected:  #1A1A2E;
  --selected-fg:#F5F2EB;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Mukta', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.wrap {
  width: 100%;
  max-width: 540px;
  padding: 0 20px 80px;
}

/* ── Header ── */
header {
  padding: 32px 0 16px;
  text-align: center;
}

.brand {
  font-family: 'Tiro Devanagari Marathi', serif;
  font-size: 2rem;
  letter-spacing: -0.01em;
  line-height: 1.2;
  color: var(--ink);
}

.brand span {
  color: var(--saffron);
}

.tagline {
  margin-top: 6px;
  font-size: 0.88rem;
  color: var(--ink-soft);
  letter-spacing: 0.02em;
}

.day-pill {
  display: inline-block;
  margin-top: 12px;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  color: var(--teal);
  background: var(--teal-bg);
  padding: 3px 14px;
  border-radius: 999px;
}

/* ── Progress bar ── */
.progress-wrap {
  margin: 20px 0 8px;
}

.progress-track {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: var(--saffron);
  border-radius: 2px;
  transition: width 0.4s cubic-bezier(.2,.8,.2,1);
}

.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.78rem;
  color: var(--ink-soft);
  margin-top: 6px;
}

/* ── Question card ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 22px 22px;
  box-shadow: 0 1px 4px rgba(26,26,46,0.06);
}

.q-number {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--saffron);
  margin-bottom: 10px;
  text-transform: uppercase;
}

.q-text {
  font-family: 'Tiro Devanagari Marathi', serif;
  font-size: 1.45rem;
  line-height: 1.55;
  color: var(--ink);
  margin-bottom: 22px;
  padding-bottom: 18px;
  border-bottom: 1.5px solid var(--border);
}

/* ── Options ── */
.opt {
  display: block;
  width: 100%;
  text-align: left;
  font-family: 'Mukta', sans-serif;
  font-size: 1rem;
  color: var(--ink);
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  margin-bottom: 9px;
  cursor: pointer;
  transition: border-color 0.12s, background 0.12s, transform 0.06s;
  line-height: 1.4;
}

.opt:last-of-type {
  margin-bottom: 0;
}

.opt:hover:not(:disabled) {
  border-color: var(--saffron);
  background: var(--saffron-bg);
}

.opt:active:not(:disabled) {
  transform: scale(0.99);
}

.opt:focus-visible {
  outline: 2px solid var(--saffron);
  outline-offset: 2px;
}

.opt:disabled {
  cursor: default;
}

.opt.chosen {
  background: var(--selected);
  border-color: var(--selected);
  color: var(--selected-fg);
  font-weight: 500;
}

.opt.dim {
  opacity: 0.38;
}

/* ── Next button ── */
.next-btn {
  display: block;
  width: 100%;
  margin-top: 16px;
  background: var(--saffron);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'Mukta', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  padding: 13px 24px;
  cursor: pointer;
  transition: background 0.12s;
  letter-spacing: 0.02em;
}

.next-btn:hover {
  background: #C96A28;
}

.next-btn:focus-visible {
  outline: 2px solid var(--saffron);
  outline-offset: 2px;
}

/* ── Result screen ── */
.result {
  text-align: center;
}

.result-headline {
  font-family: 'Tiro Devanagari Marathi', serif;
  font-size: 2.2rem;
  color: var(--teal);
  line-height: 1.25;
  margin-bottom: 4px;
}

.result-sub {
  font-size: 0.95rem;
  color: var(--ink-soft);
  margin-bottom: 24px;
}

/* streak row */
.streak-row {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 26px;
  flex-wrap: wrap;
}

.streak-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 20px;
  min-width: 90px;
  text-align: center;
}

.streak-num {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.1;
}

.streak-num.fire {
  color: var(--saffron);
}

.streak-lbl {
  font-size: 0.72rem;
  color: var(--ink-soft);
  margin-top: 2px;
  letter-spacing: 0.03em;
}

/* summary */
.summary-title {
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--ink-soft);
  text-align: left;
  margin-bottom: 10px;
  text-transform: uppercase;
}

.summary-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  margin-bottom: 8px;
  text-align: left;
}

.summary-q {
  font-size: 0.8rem;
  color: var(--ink-soft);
  margin-bottom: 4px;
  line-height: 1.35;
}

.summary-a {
  font-size: 0.98rem;
  color: var(--ink);
  font-weight: 500;
  line-height: 1.4;
}

.summary-a::before {
  content: '→ ';
  color: var(--saffron);
  font-weight: 600;
}

/* share button */
.share-btn {
  display: inline-block;
  margin-top: 20px;
  background: var(--ink);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  font-family: 'Mukta', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  padding: 12px 32px;
  cursor: pointer;
  transition: background 0.12s;
  letter-spacing: 0.02em;
}

.share-btn:hover {
  background: var(--teal);
}

.share-confirm {
  font-size: 0.82rem;
  color: var(--teal);
  margin-top: 8px;
  min-height: 18px;
}

.come-back {
  margin-top: 18px;
  font-size: 0.84rem;
  color: var(--ink-soft);
}

/* ── Already done today ── */
.done-banner {
  background: var(--teal-bg);
  border: 1px solid var(--teal);
  border-radius: 12px;
  padding: 14px 18px;
  text-align: center;
  font-size: 0.92rem;
  color: var(--teal);
  margin-bottom: 20px;
  font-weight: 500;
}

footer {
  margin-top: auto;
  padding: 24px;
  font-size: 0.75rem;
  color: var(--ink-soft);
  text-align: center;
  letter-spacing: 0.03em;
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; }
}

@media (max-width: 400px) {
  .brand { font-size: 1.75rem; }
  .q-text { font-size: 1.25rem; }
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">बुद्धी<span>घर</span></div>
    <div class="tagline">७ प्रश्न · ३० सेकंद · स्वतःबद्दलचे निरीक्षण</div>
    <div class="day-pill" id="dayPill"></div>
  </header>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-meta">
      <span id="progressText"></span>
      <span id="streakText"></span>
    </div>
  </div>

  <main id="game"></main>

</div>

<footer>बुद्धीघर · रोजचे निरीक्षण</footer>

<script>
(function () {
  "use strict";

  /* ── Config ── */
  var LAUNCH    = "2026-06-15";
  var STORE_KEY = "buddhighar_v1";

  /* ── Questions ── */
  var QUESTIONS = [
    {
      q: "आज मी माझ्या संकल्पासाठी वेळ दिला का?",
      o: [
        "हो, दिला ना",
        "थोडासा",
        "जवळजवळ नाहीच म्हणा ना!",
        "अजिबात नाही"
      ]
    },
    {
      q: "आज संकल्प पाळायला सर्वात जास्त मदत कशामुळे झाली?",
      o: [
        "ठरलेली वेळ",
        "ठरलेली जागा",
        "आता सवय झाली आहे",
        "आज कशाचीच मदत झाली नाही"
      ]
    },
    {
      q: "आज सर्वात मोठा अडथळा कोणता होता?",
      o: [
        "वेळ",
        "Energy level",
        "विसरणं",
        "मन नसणं"
      ]
    },
    {
      q: "आज संकल्प सोपा वाटला की कठीण?",
      o: [
        "खूप सोपा",
        "बऱ्यापैकी सोपा",
        "थोडा कठीण",
        "खूप कठीण"
      ]
    },
    {
      q: "आज मी संकल्प का पाळला?",
      o: [
        "स्वतःला दिलेलं वचन",
        "मला त्याचा फायदा जाणवतोय",
        "सवय बनतेय",
        "आज पाळलाच नाही"
      ]
    },
    {
      q: "आज मी स्वतःबद्दल काय निरीक्षण केलं?",
      o: [
        "सुरुवात केली की पुढे होतं",
        "थकवा आला की थांबायला होतं",
        "वेळ काढता येतो",
        "अजून समजत नाहीये"
      ]
    },
    {
      q: "उद्यासाठी एक छोटा निर्णय?",
      o: [
        "वेळ बदलणार",
        "प्रमाण कमी करणार",
        "तसेच ठेवणार",
        "पुन्हा सुरुवात करणार"
      ]
    }
  ];

  /* ── IST date helpers ── */
  function istToday() {
    return new Date().toLocaleDateString("en-CA", { timeZone: "Asia/Kolkata" });
  }

  function dayDiff(a, b) {
    return Math.round(
      (new Date(b + "T00:00:00Z") - new Date(a + "T00:00:00Z")) / 86400000
    );
  }

  var todayStr  = istToday();
  var dayNumber = dayDiff(LAUNCH, todayStr) + 1; // 1-based display

  /* ── State ── */
  function loadState() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
    catch (e) { return {}; }
  }

  function saveState(s) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch (e) {}
  }

  var state = loadState();
  if (!state.answers)             state.answers    = {};
  if (typeof state.streak        !== "number") state.streak     = 0;
  if (typeof state.bestStreak    !== "number") state.bestStreak = 0;
  if (typeof state.daysPlayed    !== "number") state.daysPlayed = 0;
  if (!state.lastPlayed)          state.lastPlayed = null;

  var todayAnswers  = state.answers[todayStr] || [];
  var current       = todayAnswers.length;
  var finishedToday = current >= QUESTIONS.length;

  /* ── DOM refs ── */
  var game         = document.getElementById("game");
  var progressFill = document.getElementById("progressFill");
  var progressText = document.getElementById("progressText");
  var streakText   = document.getElementById("streakText");
  document.getElementById("dayPill").textContent = "दिवस " + dayNumber + " · " + todayStr;

  /* ── Header update ── */
  function updateHeader() {
    var done = todayAnswers.length;
    progressFill.style.width = (done / QUESTIONS.length * 100) + "%";

    if (finishedToday) {
      progressText.textContent = "आज पूर्ण ✓";
    } else {
      progressText.textContent = "प्रश्न " + Math.min(done + 1, QUESTIONS.length) + " / " + QUESTIONS.length;
    }

    streakText.textContent = "🔥 " + state.streak + " दिवस";
  }

  /* ── Question screen ── */
  function showQuestion(index) {
    var q    = QUESTIONS[index];
    var card = document.createElement("div");
    card.className = "card";

    var html = '<div class="q-number">प्रश्न ' + (index + 1) + ' पैकी ' + QUESTIONS.length + '</div>' +
               '<div class="q-text">' + q.q + '</div>';

    for (var i = 0; i < q.o.length; i++) {
      html += '<button class="opt" data-i="' + i + '">' + q.o[i] + '</button>';
    }

    card.innerHTML = html;
    game.innerHTML = "";
    game.appendChild(card);
    updateHeader();

    var opts = card.querySelectorAll(".opt");

    function pick(chosen) {
      todayAnswers.push(chosen);
      state.answers[todayStr] = todayAnswers;
      saveState(state);

      for (var j = 0; j < opts.length; j++) {
        opts[j].disabled = true;
        if (j === chosen) {
          opts[j].classList.add("chosen");
        } else {
          opts[j].classList.add("dim");
        }
      }

      updateHeader();

      var btn       = document.createElement("button");
      btn.className = "next-btn";
      var isLast    = index + 1 >= QUESTIONS.length;
      btn.textContent = isLast ? "निकाल पाहा" : "पुढचा प्रश्न →";

      btn.addEventListener("click", function () {
        current++;
        if (isLast) {
          finishDay();
        } else {
          showQuestion(current);
        }
      });

      card.appendChild(btn);
      btn.focus();
    }

    for (var k = 0; k < opts.length; k++) {
      (function (btn) {
        btn.addEventListener("click", function () {
          pick(parseInt(btn.getAttribute("data-i"), 10));
        });
      })(opts[k]);
    }
  }

  /* ── Finish & streak ── */
  function finishDay() {
    if (!state._finishedDates) state._finishedDates = {};

    if (!state._finishedDates[todayStr]) {
      state._finishedDates[todayStr] = true;

      // streak: continued if last played was yesterday
      var lp = state.lastPlayed;
      if (lp && dayDiff(lp, todayStr) === 1) {
        state.streak += 1;
      } else if (lp && dayDiff(lp, todayStr) === 0) {
        // same day edge case — no change
      } else {
        state.streak = 1;
      }

      if (state.streak > state.bestStreak) state.bestStreak = state.streak;
      state.daysPlayed  += 1;
      state.lastPlayed   = todayStr;
      saveState(state);
    }

    finishedToday = true;
    showResult();
  }

  /* ── Result screen ── */
  function showResult() {
    updateHeader();

    var html = '<div class="result">' +
      '<div class="result-headline">उद्या पुन्हा यावे 🙏</div>' +
      '<div class="result-sub">आजचे निरीक्षण नोंदवले गेले.</div>' +

      '<div class="streak-row">' +
        '<div class="streak-box">' +
          '<div class="streak-num fire">🔥 ' + state.streak + '</div>' +
          '<div class="streak-lbl">सध्याचा streak</div>' +
        '</div>' +
        '<div class="streak-box">' +
          '<div class="streak-num">' + state.bestStreak + '</div>' +
          '<div class="streak-lbl">सर्वोत्तम streak</div>' +
        '</div>' +
        '<div class="streak-box">' +
          '<div class="streak-num">' + state.daysPlayed + '</div>' +
          '<div class="streak-lbl">एकूण दिवस</div>' +
        '</div>' +
      '</div>' +

      '<div class="summary-title">आजचे उत्तर</div>';

    for (var i = 0; i < QUESTIONS.length; i++) {
      var ans = todayAnswers[i];
      var ansText = (typeof ans !== "undefined") ? QUESTIONS[i].o[ans] : "—";
      html += '<div class="summary-item">' +
        '<div class="summary-q">' + QUESTIONS[i].q + '</div>' +
        '<div class="summary-a">' + ansText + '</div>' +
      '</div>';
    }

    html +=
      '<button class="share-btn" id="shareBtn">शेअर करा</button>' +
      '<div class="share-confirm" id="shareFeedback"></div>' +
      '<div class="come-back">उद्याही येणे. ७ प्रश्न. ३० सेकंद. स्वतःबद्दलचे निरीक्षण 🌅</div>' +
    '</div>';

    game.innerHTML = html;

    document.getElementById("shareBtn").addEventListener("click", function () {
      var txt = "बुद्धीघर — दिवस " + dayNumber + "\n" +
                "आज संकल्प निरीक्षण केलं ✅\n" +
                "🔥 " + state.streak + " दिवसांचा streak\n" +
                location.href;

      var feedback = document.getElementById("shareFeedback");

      function done() {
        feedback.textContent = "कॉपी झाले ✓";
        setTimeout(function () { feedback.textContent = ""; }, 2500);
      }

      if (navigator.share) {
        navigator.share({ text: txt }).catch(function () {});
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(txt).then(done).catch(function () {});
      }
    });
  }

  /* ── Boot ── */
  if (finishedToday) {
    if (!state._finishedDates) state._finishedDates = {};
    if (!state._finishedDates[todayStr]) {
      finishDay();
    } else {
      showResult();
    }
  } else {
    showQuestion(current);
  }

})();
</script>
</body>
</html>
